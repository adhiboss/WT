<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhizone 📞 - Contact</title>
  <meta name="description" content="Contact Adhizone - Get in touch with us.">
  <link rel="icon" type="image/png" href="logo (2).png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo (2).png" alt="Adhizone Logo">
    <span class="logo-text">Adhi<span>zone</span></span>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="Search help topics...">
    <button>Search</button>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">🛒 Cart</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<div class="contact-container">
  <h2>📞 Contact Us</h2>

  <form>
    <label>Full Name</label>
    <input type="text" placeholder="Enter your full name" required>

    <label>Email Address</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Message</label>
    <textarea placeholder="Write your message here..." required></textarea>

    <button type="submit">Send Message →</button>
  </form>
</div>

<footer>
  <p>© 2026 <span>Adhizone</span> | Made with ❤️ by Adhi</p>
</footer>
